name: Process Issue

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read
  actions: write

concurrency:
  group: process-issue-main
  cancel-in-progress: false

jobs:
  process:
    if: |
      contains(github.event.issue.labels.*.name, 'movie') ||
      contains(github.event.issue.labels.*.name, 'book')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process movie issue
        if: contains(github.event.issue.labels.*.name, 'movie')
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/process-movie.mjs

      - name: Process book issue
        if: contains(github.event.issue.labels.*.name, 'book')
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: node scripts/process-book.mjs

      - name: Commit updated data files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json data/books.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "data_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: add entry from issue #${{ github.event.issue.number }}"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "data_changed=true" >> $GITHUB_OUTPUT

      - name: Trigger deploy
        if: steps.commit.outputs.data_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
