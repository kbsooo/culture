name: Backfill Issues

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: process-issue-main
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Backfill closed issues
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: node scripts/backfill-issues.mjs

      - name: Commit updated data files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json data/books.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "data_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: backfill closed issues"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "data_changed=true" >> $GITHUB_OUTPUT
